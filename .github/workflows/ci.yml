name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq and ripgrep
        run: brew install jq ripgrep

      - name: Run repository checks
        run: ./scripts/check.zsh
